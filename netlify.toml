# https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: all routes serve the Vite app (direct URL loads & refreshes work)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
